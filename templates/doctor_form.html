<!DOCTYPE html>
<html>

<head>
    <title>Add Doctor</title>
</head>

<body>

<h1>Add Doctor</h1>

<form action="/add_doctor" method="POST">

    <input
        type="text"
        name="name"
        placeholder="Doctor Name"
        required>

    <br><br>

    <input
        type="text"
        name="specialization"
        placeholder="Specialization"
        required>

    <br><br>

    <button type="submit">
        Save Doctor
    </button>

</form>

</body>
</html>
